# Dataset configuration for Graph-CoLD
# Codex: fill paths after downloading datasets into ./data (git-ignored).

cicids2017:
  name: CICIDS-2017
  path: data/cicids2017/
  class_policy: postfilter11
  num_classes: 11
  # Selected policy: postfilter11. Drop classes with <1000 samples, then
  # downsample the single dominant class to the largest remaining class count.
  min_class_count: 1000
  train_test_split: 0.8
  label_col: Label
  # Feature columns are inferred; drop identifiers (flow id, timestamps used only for temporal view).
  drop_cols: [Flow ID, Src IP, Dst IP, Source IP, Destination IP, Timestamp]

maltls22:
  name: MALTLS-22
  path: data/maltls22/
  num_classes: 23
  train_test_split: 0.8
  label_col: label
  drop_cols: []

cesnet_tls_year22:
  name: CESNET-TLS-Year22
  path: data/tls_alternative/cesnet_tls_year22/
  reported_as: CESNET-TLS-Year22
  replacement_for: maltls22
  source_verified: true
  class_policy: postfilter
  min_class_count: 1000
  train_test_split: 0.8
  # Set this after inspecting the downloaded schema if it differs.
  label_col: label
  sample_rows: null
  drop_cols: []

unsw_nb15:
  name: UNSW-NB15
  path: data/unsw_nb15/
  reported_as: UNSW-NB15
  source_verified: true
  class_policy: postfilter
  min_class_count: 1000
  train_test_split: 0.8
  label_col: attack_cat
  label_mode: multiclass
  sample_rows: null
  drop_cols: [id]

ustc_tfc2016:
  name: USTC-TFC2016
  path: data/ustc_tfc2016/
  reported_as: USTC-TFC2016
  source_verified: false
  candidate_only: true
  train_test_split: 0.8
  label_col: label
  drop_cols: []

optc:
  name: OpTC
  path: data/optc/
  # Enterprise case study only. Reuse Flash/Argus provenance-graph features.
  provenance_feature_source: flash   # {flash, argus}
  downstream_classifier: xgboost
